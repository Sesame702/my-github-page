<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - LUXORA CLOTHING STORE</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
    rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="contact-body">

    <!-- NAVBAR -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-black px-4">
            <a class="navbar-brand" href="index.html">LUXORA</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- CONTACT SECTION -->
    <section class="contact-container">
        <h1>Contact Us</h1>
        <p>Select an option below to reach us instantly:</p>

        <div class="contact-box">

            <div class="contact-item">
                <h3>Call Us</h3>
                <a class="contact-link" href="tel:+26775542328">📞 Tap to Call</a>
            </div>

            <div class="contact-item">
                <h3>Facebook</h3>
                <a class="contact-link" href="https://facebook.com" target="_blank">🌐 Open Facebook</a>
            </div>

            <div class="contact-item">
                <h3>Instagram</h3>
                <a class="contact-link" href="https://instagram.com" target="_blank">📸 Open Instagram</a>
            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer class="text-center py-3 bg-dark text-white mt-5">
        <p>&copy; 2026 LUXORA Clothing Store</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

</body>
</html>
